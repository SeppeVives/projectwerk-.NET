services:
  dotnet-bestelplatform-db:
    container_name: dotnet-bestelplatform-db
    image: mariadb
    ports:
     - 3307:3306
    volumes:
     - ./db/config:/var/lib/mysql
     - ./db/init:/docker-entrypoint-initdb.d
    environment:
     - MARIADB_ROOT_PASSWORD=root
     - MARIADB_DATABASE=bestelplatform
     - TZ=Europe/Brussels
    restart: unless-stopped
  dotnet-bestelplatform-dbadmin:
    container_name: dotnet-bestelplatform-dbadmin
    image: phpmyadmin
    ports:
     - 81:80
    environment:
     - PMA_HOST=dotnet-bestelplatform-db
    depends_on:
     - dotnet-bestelplatform-db
    restart: unless-stopped
